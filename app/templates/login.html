{% extends "base.html" %}
{% block title %}Login · snickr{% endblock %}
{% block content %}
  <div class="card">
    <h1>Login</h1>
    <form method="post" action="/login?csrf_token={{ request.session.get('csrf_token') }}">
      <input type="hidden" name="csrf_token" value="{{ request.session.get('csrf_token') }}" />
      <label class="field">
        <span>Email</span>
        <input name="email" type="email" autocomplete="email" required />
      </label>
      <label class="field">
        <span>Password</span>
        <input name="password" type="password" autocomplete="current-password" required />
      </label>
      <button class="btn" type="submit">Sign in</button>
    </form>
    <p class="muted">New here? <a href="/register">Create an account</a>.</p>
  </div>
{% endblock %}
