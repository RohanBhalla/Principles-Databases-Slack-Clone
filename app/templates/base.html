<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}snickr{% endblock %}</title>
    <link rel="icon" href="/static/favicon.png" type="image/png" sizes="64x64" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__brand"><a href="/">snickr</a></div>
      <div class="topbar__right">
        {% if request.session.get("user_id") %}
          <a class="topbar__link" href="/search">Search</a>
          <form method="post" action="/logout?csrf_token={{ request.session.get('csrf_token') }}" class="inline">
            <input type="hidden" name="csrf_token" value="{{ request.session.get('csrf_token') }}" />
            <button class="linkbtn" type="submit">Logout</button>
          </form>
        {% else %}
          <a class="topbar__link" href="/login">Login</a>
          <a class="topbar__link" href="/register">Register</a>
        {% endif %}
      </div>
    </header>

    <main class="container">
      {% if error %}
        <div class="alert alert--error">{{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="alert alert--success">{{ success }}</div>
      {% endif %}
      <input type="hidden" id="csrf_token" value="{{ request.session.get('csrf_token') }}" />
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
